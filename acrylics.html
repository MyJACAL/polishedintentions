<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acrylics | Polished Intentions</title>

<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Playfair+Display:wght@400;500;600&family=Kaushan+Script&display=swap" rel="stylesheet">

<style>

:root {
  --black:#000;
  --gold:#c9a24e;
  --text:#f2eee6;
  --sage:#a3b899;
}

body {
  margin:0;
  font-family:'Italiana', serif;
  background: linear-gradient(180deg, rgba(163,184,153,0.25), #000 60%);
  color:var(--text);
  text-align:center;
}

/* HEADER */
.header {
  padding:70px 20px 30px;
}

.logo {
  width:230px;
  margin-bottom:20px;
}

h1 {
  color:var(--gold);
  font-size:34px;
}

/* IMAGE */
.feature-img {
  width:260px;
  height:260px;
  object-fit:cover;
  border-radius:16px;
  border:1px solid rgba(201,162,78,0.4);
  margin:25px auto;
}

/* DIVIDER */
.divider {
  width:80px;
  height:2px;
  margin:35px auto;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* MENU */
.menu {
  max-width:650px;
  margin:auto;
  text-align:left;
  font-family:'Playfair Display', serif;
  font-size:17px;
  line-height:2.2;
  color:#e6e1d8;
}

.section-title {
  font-family:'Italiana', serif;
  color:var(--gold);
  font-size:22px;
  margin-top:25px;
}

.line {
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(163,184,153,0.15);
  padding:6px 0;
}

/* BUTTON */
.button {
  display:inline-block;
  margin-top:40px;
  padding:14px 38px;
  border-radius:40px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  background:#000;
  font-family:'Kaushan Script', cursive;
}

</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>Acrylic Services</h1>
  <p>Custom sets designed with precision, luxury, and intention.</p>

  <img src="Red Nails.jpg" class="feature-img">
</div>

<div class="divider"></div>

<div class="menu">

  <div class="section-title">Full Sets</div>
  <div class="line"><span>Short</span><span>$70</span></div>
  <div class="line"><span>Medium</span><span>$80</span></div>
  <div class="line"><span>Long</span><span>$90</span></div>
  <div class="line"><span>XL</span><span>$100</span></div>

  <div class="section-title">Fills</div>
  <div class="line"><span>2 Weeks</span><span>$65</span></div>
  <div class="line"><span>3 Weeks</span><span>$75</span></div>
  <div class="line"><span>Rebalance</span><span>$85</span></div>

  <div class="section-title">Add-Ons</div>
  <div class="line"><span>Specialty Shape</span><span>$10</span></div>
  <div class="line"><span>Shape Change</span><span>$10</span></div>
  <div class="line"><span>Sublimation</span><span>$15</span></div>
  <div class="line"><span>Paraffin</span><span>$20</span></div>

</div>

<div class="divider"></div>

<a href="index.html" class="button">Back Home</a>

</body>
</html>
